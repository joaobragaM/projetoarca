<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCA - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-screen">
  <main class="login-card">
    <div class="brand">ARCA</div>
    <h1>Faça seu login</h1>

    <form id="loginForm">
      <input id="loginUser" type="text" placeholder="E-mail ou telefone" autocomplete="username">
      <input type="password" placeholder="Senha" autocomplete="current-password">
      <button class="primary-btn" type="submit">Entrar</button>
    </form>

    <nav class="login-links" aria-label="Links de acesso">
      <a href="#">Esqueci minha senha</a>
      <a href="home.html">Não possuo uma conta</a>
    </nav>

    <a class="support-link" href="contato.html">Entrar em contato com suporte</a>
  </main>
  <script src="app.js"></script>
</body>
</html>
